name: Bootstrap Project Board (v2)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check GitHub CLI
        run: gh --version

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Auth GH CLI
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: gh auth status

      - name: Create Project + seed draft issues
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -e

          TITLE="Ashen Emporium — Roadmap"
          echo "Creating project: $TITLE"

          # Try to create as a user-owned project first
          PROJECT_ID=$(gh api graphql -f query='
            query($owner: String!) {
              user(login: $owner) { id }
            }' -F owner="$OWNER" --jq '.data.user.id' 2>/dev/null || true)

          if [ -n "$PROJECT_ID" ]; then
            OWNER_ID="$PROJECT_ID"
          else
            echo "Could not resolve user owner. Trying organization..."
            OWNER_ID=$(gh api graphql -f query='
              query($owner: String!) {
                organization(login: $owner) { id }
              }' -F owner="$OWNER" --jq '.data.organization.id')
          fi

          PROJECT_ID=$(gh api graphql -f query='
            mutation($ownerId: ID!, $title: String!) {
              createProjectV2(input: { ownerId: $ownerId, title: $title }) {
                projectV2 { id }
              }
            }' -F ownerId="$OWNER_ID" -F title="$TITLE" --jq '.data.createProjectV2.projectV2.id')

          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

          # Create Status single-select field with options
          FIELD_ID=$(gh api graphql -f query='
            mutation($projectId: ID!) {
              createProjectV2Field(input: {
                projectId: $projectId,
                dataType: SINGLE_SELECT,
                name: "Status",
                singleSelectOptions: [
                  { name: "Backlog", color: GRAY }
                  { name: "In Progress", color: BLUE }
                  { name: "Blocked", color: RED }
                  { name: "Review", color: YELLOW }
                  { name: "Done", color: GREEN }
                ]
              }) {
                projectV2Field {
                  ... on ProjectV2SingleSelectField {
                    id
                  }
                }
              }
            }' -F projectId="$PROJECT_ID" --jq '.data.createProjectV2Field.projectV2Field.id')

          echo "STATUS_FIELD_ID=$FIELD_ID" >> "$GITHUB_ENV"

          # Get option IDs for setting initial status
          OPTIONS_JSON=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  field(name: "Status") {
                    ... on ProjectV2SingleSelectField {
                      options { id name }
                    }
                  }
                }
              }
            }' -F projectId="$PROJECT_ID" --jq '.data.node.field.options')

          BACKLOG_ID=$(echo "$OPTIONS_JSON" | jq -r '.[] | select(.name=="Backlog") | .id')

          ITEMS=(
            "Design system: Gothic UI tokens (colors, typography, spacing) + reusable components"
            "Navigation: responsive navbar + offcanvas + consistent CTAs"
            "Homepage: hero, featured categories, trust badges, newsletter section"
            "Catalog: filtering, sorting, pagination, empty-states"
            "Product detail: image gallery, stock status, related products, SEO meta"
            "Cart UX: quantity update, remove, totals, shipping messaging"
            "Checkout: address form validation, order summary, error handling"
            "Payments: Stripe webhook as source of truth, idempotency, order lifecycle"
            "Orders: status transitions (placed→paid→fulfilled/refunded/cancelled) + admin tools"
            "Emails: order confirmation/paid email + contact form reply-to wiring"
            "Accounts: register/login/logout, profile, order history"
            "Accessibility: keyboard nav, focus states, alt text, ARIA, contrast checks"
            "Performance: image optimisation, caching, Lighthouse improvements"
            "Testing: expand coverage for catalog/cart/orders/payments + CI enforcement"
            "Deployment: env var checklist, static/media config, production hardening"
          )

          for title in "${ITEMS[@]}"; do
            ITEM_ID=$(gh api graphql -f query='
              mutation($projectId: ID!, $title: String!) {
                addProjectV2DraftIssue(input: { projectId: $projectId, title: $title }) {
                  projectItem { id }
                }
              }' -F projectId="$PROJECT_ID" -F title="$title" --jq '.data.addProjectV2DraftIssue.projectItem.id')

            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }' -F projectId="$PROJECT_ID" -F itemId="$ITEM_ID" -F fieldId="$FIELD_ID" -F optionId="$BACKLOG_ID" >/dev/null

            echo "Added: $title"
          done

          echo ""
          echo "Done. Open your Project via:"
          echo "https://github.com/users/$OWNER/projects"